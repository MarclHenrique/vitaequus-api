spring.application.name=vitaequus-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

server.port=${SERVER_PORT:8081}

springdoc.swagger-ui.url=/openapi.yaml

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:28800000}
jwt.issuer=${JWT_ISSUER:vitaequus-api}
jwt.audience=${JWT_AUDIENCE:vitaequus-clients}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}
