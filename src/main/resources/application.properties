spring.application.name=vitaequus-api

# H2 Database
spring.datasource.url=jdbc:h2:mem:vitaequus-api
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8081

# Swagger / OpenAPI manual
springdoc.swagger-ui.url=/openapi.yaml

#jwt Token

jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=28800000

logging.level.org.springframework.security=DEBUG

